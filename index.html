<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Logbook - Mobile Edge</title>
    <style>
        /* 深夜の山頂でも眩しくないダークスキーム */
        body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background-color: #121212; margin: 0; padding: 10px; color: #d0d0d0; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 2px; border: 1px solid #333; }
        h2 { text-align: center; color: #0099ff; margin-top: 5px; font-size: 1rem; letter-spacing: 3px; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: 900; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.75rem; color: #888; letter-spacing: 1px; }
        
        /* ★高さのズレを解消するため height: 48px に完全固定し、デフォルトスタイルをリセット */
        input[type="text"], input[type="number"], input[type="time"], input[type="date"], select, textarea { 
            width: 100%; height: 48px; padding: 0 12px; border: 1px solid #333; border-radius: 4px; box-sizing: border-box; 
            font-size: 1rem; background-color: #2a2a2a; color: #fff; -webkit-appearance: none; 
        }
        textarea { height: auto; padding: 12px; }
        input:focus, select:focus, textarea:focus { border-color: #0099ff; outline: none; }
        
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        
        button { width: 100%; padding: 14px; font-size: 0.95rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: #fff; margin-bottom: 10px; transition: all 0.2s ease;}
        .btn-start { background-color: #004d99; border-bottom: 3px solid #003366; }
        .btn-save { background-color: #2d5a27; border-bottom: 3px solid #1e3d1a; }
        .btn-bozu { background-color: #4d2d7d; border-bottom: 3px solid #351f56; }
        .btn-export { background-color: #8a6d00; border-bottom: 3px solid #5c4900; margin-top: 15px; }
        .btn-clear { background-color: #444; border-bottom: 3px solid #222; }
        button:active { transform: translateY(2px); border-bottom: none; margin-bottom: 13px; }

        .input-with-btn { display: flex; gap: 5px; }
        .btn-now { width: auto; margin-bottom: 0; padding: 0 15px; background-color: #333; font-size: 0.8rem; border: 1px solid #444; color: #aaa; }
        .btn-now.active { background-color: #0056b3; border-color: #00aaff; color: #fff; font-weight: bold; }

        /* ★横スクロールするチップ型UI（BAND/特小モード用） */
        .chip-container {
            display: flex; overflow-x: auto; gap: 8px; height: 48px; align-items: center;
            -webkit-overflow-scrolling: touch; scrollbar-width: none; /* スクロールバー非表示 */
        }
        .chip-container::-webkit-scrollbar { display: none; }
        .chip {
            flex: 0 0 auto; padding: 0 16px; height: 38px; line-height: 38px;
            background-color: #2a2a2a; border: 1px solid #444; border-radius: 20px;
            font-size: 0.85rem; color: #888; font-weight: bold; transition: all 0.2s ease; cursor: pointer;
        }
        .chip.active { background-color: #0056b3; border-color: #00aaff; color: #fff; }

        .env-data { background: #000; padding: 10px; border-radius: 4px; font-size: 0.8rem; color: #00ff41; margin-bottom: 15px; border: 1px solid #222; font-family: "Courier New", monospace; line-height: 1.4; white-space: pre-wrap; }
        #status { text-align: center; font-weight: bold; color: #ff9900; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 1px; }
        
        #logCount { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 5px; }
        .log-card { background: #252525; border-left: 3px solid #0099ff; padding: 10px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;}
        .log-card-chk { margin-top: 3px; transform: scale(1.3); }
        .log-card-content { flex: 1; }
        .log-card-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 4px; color: #0099ff; font-size: 0.85rem; }
        .log-card-body { font-size: 0.75rem; color: #bbb; }
        .log-card-tag { color: #8a6d00; font-weight: bold; }
        .log-card-actions { display: flex; gap: 8px; margin-top: 8px; }
        .log-card-actions button { margin-bottom: 0; padding: 6px; font-size: 0.7rem; background: #333; border: 1px solid #444; }

        #slpr_area { display: none; background: #222; padding: 12px; border: 1px solid #333; border-radius: 4px; margin-bottom: 15px; }
        #rpt_name_area { display: none; margin-top: 10px; }
        .section-divider { border-top: 1px dashed #444; margin: 20px 0; }
        .list-header { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Radio Logbook Mobile β</h2>
    <div id="status">システム待機中</div>

    <button type="button" class="btn-start" onclick="setNowAndFetch()">現在地/天候情報の取得更新</button>
    <div id="envDisplay" class="env-data">環境データ未取得</div>

    <input type="hidden" id="my_lat"><input type="hidden" id="my_lon"><input type="hidden" id="my_alt">
    <input type="hidden" id="env_weather"><input type="hidden" id="env_temp"><input type="hidden" id="env_hum">
    <input type="hidden" id="env_press"><input type="hidden" id="env_wind">
    <input type="hidden" id="env_cape"><input type="hidden" id="env_uv">

    <div class="form-group"><label>DATE (年月日)</label><input type="date" id="date"></div>
    <div class="form-group">
        <label>START TIME (開始)</label>
        <div class="input-with-btn">
            <input type="time" id="time" oninput="resetNowBtn('time')">
            <button type="button" id="btn_now_time" class="btn-now" onclick="toggleNowTime('time')">今</button>
        </div>
    </div>
    
    <div class="row">
        <div class="form-group"><label>CALLSIGN</label><input type="text" id="callsign" placeholder="相手局コール"></div>
        
        <div class="form-group"><label>RS</label><input type="text" id="rs" placeholder="59/59" inputmode="email" autocapitalize="characters" oninput="toHalfWidth(this)" onblur="autoFormatRS(this)"></div>
    </div>

    <div class="row">
        <div class="form-group" style="flex: 3; min-width: 0;">
            <label>BAND (スワイプで選択)</label>
            <div class="chip-container" id="band_chips">
                <div class="chip active" data-value="市民ラジオ/CB" onclick="setBand('市民ラジオ/CB', this)">CB</div>
                <div class="chip" data-value="デジタル簡易無線/DCR" onclick="setBand('デジタル簡易無線/DCR', this)">DCR</div>
                <div class="chip" data-value="特定小電力無線/SLPR" onclick="setBand('特定小電力無線/SLPR', this)">特小</div>
                <div class="chip" data-value="デジタル小電力コミュニティ無線/LCR" onclick="setBand('デジタル小電力コミュニ無線/LCR', this)">LCR</div>
            </div>
            <input type="hidden" id="band" value="市民ラジオ/CB">
        </div>
        
        <div class="form-group" style="flex: 1; min-width: 60px;">
            <label>CH</label>
            <input type="text" id="channel" placeholder="3" inputmode="email" autocapitalize="characters" oninput="toHalfWidth(this)">
        </div>
    </div>

    <div id="slpr_area">
        <div class="form-group">
            <label>特小モード</label>
            <div class="chip-container" id="mode_chips">
                <div class="chip active" data-value="シンプレックス" onclick="setSlprMode('シンプレックス', this)">単信 (シンプレックス)</div>
                <div class="chip" data-value="レピーター" onclick="setSlprMode('レピーター', this)">レピーター (半複信)</div>
            </div>
            <input type="hidden" id="slpr_mode" value="シンプレックス">
        </div>
        <div id="rpt_name_area" class="form-group">
            <label>レピーター名称</label>
            <input type="text" id="repeater_name" placeholder="例: 横浜港南">
        </div>
    </div>
    
    <div class="form-group"><label>LOCATION (相手局運用地)</label><input type="text" id="location" placeholder="地名・住所・山岳名など"></div>
    
    <div class="row">
        <div class="form-group"><label>標高 (m)</label><input type="number" id="remote_altitude" oninput="toHalfWidth(this)"></div>
        <div class="form-group"><label>距離 (km)</label><input type="number" step="0.1" id="distance" oninput="toHalfWidth(this)"></div>
    </div>

    <div class="form-group"><label>TAG (使用リグ/アンテナ)</label><input type="text" id="tag" placeholder="例: RJ-60"></div>
    <div class="form-group"><label>REMARKS (備考/メモ)</label><textarea id="memo" rows="2" placeholder="交信内容など"></textarea></div>

    <div class="section-divider"></div>

    <div class="form-group">
        <label>END TIME (終了時刻)</label>
        <div class="input-with-btn">
            <input type="time" id="end_time" oninput="resetNowBtn('end_time')">
            <button type="button" id="btn_now_end_time" class="btn-now" onclick="toggleNowTime('end_time')">今</button>
        </div>
    </div>

    <div class="row">
        <div style="flex: 2;">
            <button type="button" id="btn_save_main" class="btn-save" onclick="saveLog()">記録保存</button>
        </div>
        <div style="flex: 1;">
            <button type="button" class="btn-bozu" onclick="recordBozu()">ボウズ</button>
        </div>
    </div>
    
    <button type="button" id="btn_cancel_edit" class="btn-clear" onclick="cancelEdit()" style="display:none; background-color:#666;">編集をキャンセル</button>
    <button type="button" class="btn-clear" onclick="clearForm()">フィールドクリア</button>

    <div class="list-header">
        <div id="logCount">保存済み: 0件</div>
        <button type="button" class="btn-clear" onclick="toggleSelectAll()" style="width:auto; padding: 6px 12px; margin: 0; font-size: 0.75rem;">すべて選択</button>
    </div>
    
    <div id="logListContainer"></div>

    <div class="row" style="margin-top: 15px;">
        <div style="flex: 1;">
            <button type="button" class="btn-clear" onclick="deleteSelectedLogs()" style="background-color:#8a2e2e; margin:0; height: 100%;">🗑 選択削除</button>
        </div>
        <div style="flex: 2;">
            <button type="button" class="btn-export" onclick="exportAndShare()" style="margin:0; background-color:#0056b3; border-bottom-color:#003366; height: 100%;">選択ログを転送</button>
        </div>
    </div>

    <button type="button" class="btn-clear" onclick="clearAllLogs()" style="margin-top:20px; background-color:#500;">全ログ抹消</button>
</div>

<script>
    let editingIndex = -1; 

    function toHalfWidth(el) {
        el.value = el.value.replace(/[！-～]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    }

    // ★ 新機能：RSの魔法補完（「59」と打って欄から離れると「59/59」になる）
    function autoFormatRS(el) {
        let val = el.value.trim().toUpperCase(); // 小文字入力(m5等)も大文字に統一
        // 2文字（59, 55, M5 など）の英数字だけが入力された場合、スラッシュで繰り返す
        if (/^[A-Z0-9]{2}$/.test(val)) {
            el.value = val + "/" + val;
        } else {
            el.value = val;
        }
    }

    // ★チップUI制御関数
    function setBand(val, el) {
        document.getElementById('band').value = val;
        const chips = el.parentElement.querySelectorAll('.chip');
        chips.forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({behavior: "smooth", block: "nearest", inline: "center"});
        checkSlpr();
    }

    function setSlprMode(val, el) {
        document.getElementById('slpr_mode').value = val;
        const chips = el.parentElement.querySelectorAll('.chip');
        chips.forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        checkRpt();
    }

    function updateChips(containerId, value) {
        const container = document.getElementById(containerId);
        if(!container) return;
        const chips = container.querySelectorAll('.chip');
        chips.forEach(c => {
            if(c.getAttribute('data-value') === value) {
                c.classList.add('active');
                c.scrollIntoView({behavior: "smooth", block: "nearest", inline: "center"});
            } else {
                c.classList.remove('active');
            }
        });
    }

    function checkSlpr() {
        const isSlpr = document.getElementById('band').value === "特定小電力無線/SLPR";
        document.getElementById('slpr_area').style.display = isSlpr ? "block" : "none";
    }
    
    function checkRpt() {
        const isRpt = document.getElementById('slpr_mode').value === "レピーター";
        document.getElementById('rpt_name_area').style.display = isRpt ? "block" : "none";
    }

    function toggleNowTime(id, forceSet = false) {
        const btn = document.getElementById(`btn_now_${id}`);
        const input = document.getElementById(id);
        
        if (!forceSet && btn && btn.classList.contains('active')) {
            input.value = "";
            btn.classList.remove('active');
            btn.innerText = "今";
        } else {
            const n = new Date();
            input.value = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}`;
            if (btn) {
                btn.classList.add('active');
                btn.innerText = "✔";
            }
        }
    }

    function resetNowBtn(id) {
        const btn = document.getElementById(`btn_now_${id}`);
        if(btn) {
            btn.classList.remove('active');
            btn.innerText = "今";
        }
    }

    function setNowAndFetch() {
        const n = new Date();
        const yyyy = n.getFullYear();
        const mm = String(n.getMonth() + 1).padStart(2, '0');
        const dd = String(n.getDate()).padStart(2, '0');
        document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
        
        toggleNowTime('time', true);
        fetchEnv();
    }

    async function fetchEnv() {
        const st = document.getElementById('status');
        const dp = document.getElementById('envDisplay');
        if (!navigator.geolocation) { st.innerText = "GPS非対応"; return; }
        
        st.innerText = "GPS測位中...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            document.getElementById('my_lat').value = lat;
            document.getElementById('my_lon').value = lon;
            document.getElementById('my_alt').value = pos.coords.altitude || 0;

            st.innerText = "気象データ取得中...";
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,weather_code&hourly=cape,uv_index&timezone=Asia%2FTokyo&wind_speed_unit=ms`);
                const data = await res.json();
                const cur = data.current;
                const uv = data.hourly.uv_index[new Date().getHours()];
                
                let wText = "不明";
                const code = cur.weather_code;
                if (code === 0) wText = "快晴";
                else if (code <= 3) wText = "晴れ/曇り";
                else if (code <= 49) wText = "霧";
                else if (code <= 69) wText = "雨";
                else if (code <= 79) wText = "雪";
                else wText = "雷雨";
                
                document.getElementById('env_weather').value = wText;
                document.getElementById('env_temp').value = cur.temperature_2m;
                document.getElementById('env_hum').value = cur.relative_humidity_2m;
                document.getElementById('env_press').value = cur.surface_pressure;
                document.getElementById('env_wind').value = cur.wind_speed_10m;
                document.getElementById('env_cape').value = data.hourly.cape[new Date().getHours()];
                document.getElementById('env_uv').value = uv;

                dp.innerText = `現在地: ${lat.toFixed(4)}, ${lon.toFixed(4)}\n天気: ${wText} / 気温: ${cur.temperature_2m}℃ / 湿度: ${cur.relative_humidity_2m}%\n風速: ${cur.wind_speed_10m}m/s / UV: ${uv}`;
                st.innerText = "更新完了";
            } catch (e) { st.innerText = "気象取得失敗"; }
        }, (e) => { st.innerText = "GPS失敗"; }, {enableHighAccuracy:true, timeout:8000});
    }

    function saveLog() {
        const call = document.getElementById('callsign').value.trim();
        if (!call) { alert("コールサインを入力してください。"); return; }
        
        const date = document.getElementById('date').value;
        const lat = parseFloat(document.getElementById('my_lat').value) || null;
        const lon = parseFloat(document.getElementById('my_lon').value) || null;

        let slprMode = "";
        if (document.getElementById('band').value === "特定小電力無線/SLPR") {
            const mode = document.getElementById('slpr_mode').value;
            const rpt = document.getElementById('repeater_name').value.trim();
            slprMode = (mode === "レピーター" && rpt) ? `${mode}(${rpt})` : mode;
        }

        const log = {
            callsign: call,
            start_time: `${date} ${document.getElementById('time').value}`,
            end_time: document.getElementById('end_time').value ? `${date} ${document.getElementById('end_time').value}` : "",
            band: document.getElementById('band').value,
            channel: document.getElementById('channel').value,
            rs: document.getElementById('rs').value,
            location: document.getElementById('location').value,
            remote_altitude: document.getElementById('remote_altitude').value,
            my_location: lat ? `Mobile (${lat.toFixed(4)}, ${lon.toFixed(4)})` : "Mobile",
            content: document.getElementById('memo').value,
            memo: document.getElementById('tag').value,
            slpr_mode: slprMode,
            lcr_distance: document.getElementById('distance').value,
            my_latitude: lat, my_longitude: lon,
            my_altitude: document.getElementById('my_alt').value,
            weather: document.getElementById('env_weather').value,
            temperature: document.getElementById('env_temp').value,
            humidity: document.getElementById('env_hum').value,
            pressure: document.getElementById('env_press').value,
            wind_speed: document.getElementById('env_wind').value,
            environment_data: { cape: document.getElementById('env_cape').value, uv: document.getElementById('env_uv').value },
            is_failure: (call.toUpperCase().includes("CQ")),
            is_synced: false
        };

        const logs = JSON.parse(localStorage.getItem('radioLogs') || '[]');
        
        if (editingIndex > -1) {
            logs[editingIndex] = log;
            editingIndex = -1;
            document.getElementById('status').innerText = "上書き保存しました";
            resetEditModeUI();
        } else {
            logs.push(log);
            document.getElementById('status').innerText = "記録を保存しました";
        }
        
        localStorage.setItem('radioLogs', JSON.stringify(logs));
        updateList();
        
        document.getElementById('callsign').value = "";
        document.getElementById('rs').value = "";
        document.getElementById('memo').value = "";
        document.getElementById('location').value = "";
        document.getElementById('remote_altitude').value = "";
        document.getElementById('distance').value = "";
        document.getElementById('end_time').value = "";
        
        resetNowBtn('time');
        resetNowBtn('end_time');
    }

    function editLog(index) {
        const logs = JSON.parse(localStorage.getItem('radioLogs') || '[]');
        const log = logs[index];

        document.getElementById('date').value = log.start_time.split(' ')[0] || "";
        document.getElementById('time').value = log.start_time.split(' ')[1] || "";
        document.getElementById('end_time').value = log.end_time ? log.end_time.split(' ')[1] : "";

        document.getElementById('callsign').value = log.callsign || "";
        document.getElementById('rs').value = log.rs || "";
        
        // ★BANDとモードをチップUIに復元
        const bandVal = log.band || "市民ラジオ/CB";
        document.getElementById('band').value = bandVal;
        updateChips('band_chips', bandVal);
        checkSlpr();

        if (bandVal === "特定小電力無線/SLPR") {
            let modeVal = "シンプレックス";
            if (log.slpr_mode && log.slpr_mode.includes("レピーター")) {
                modeVal = "レピーター";
                const match = log.slpr_mode.match(/レピーター\((.*?)\)/);
                if(match) document.getElementById('repeater_name').value = match[1];
            }
            document.getElementById('slpr_mode').value = modeVal;
            updateChips('mode_chips', modeVal);
            checkRpt();
        }

        document.getElementById('channel').value = log.channel || "";
        document.getElementById('location').value = log.location || "";
        document.getElementById('remote_altitude').value = log.remote_altitude || "";
        document.getElementById('distance').value = log.lcr_distance || "";
        document.getElementById('tag').value = log.memo || "";
        document.getElementById('memo').value = log.content || "";

        document.getElementById('my_lat').value = log.my_latitude || "";
        document.getElementById('my_lon').value = log.my_longitude || "";
        document.getElementById('my_alt').value = log.my_altitude || "";
        document.getElementById('env_weather').value = log.weather || "";
        document.getElementById('env_temp').value = log.temperature || "";
        document.getElementById('env_hum').value = log.humidity || "";
        document.getElementById('env_press').value = log.pressure || "";
        document.getElementById('env_wind').value = log.wind_speed || "";
        if(log.environment_data) {
            document.getElementById('env_cape').value = log.environment_data.cape || "";
            document.getElementById('env_uv').value = log.environment_data.uv || "";
        }

        document.getElementById('envDisplay').innerText = `[過去データ読込済] 天気: ${log.weather} / 気温: ${log.temperature}℃ / 湿度: ${log.humidity}%`;

        editingIndex = index;
        const btnSave = document.getElementById('btn_save_main');
        btnSave.innerText = "上書き保存";
        btnSave.style.backgroundColor = "#0056b3"; 
        btnSave.style.borderBottomColor = "#003366";
        
        document.getElementById('btn_cancel_edit').style.display = "block";
        
        window.scrollTo(0, 0);
        document.getElementById('status').innerText = `ID:${index} を編集中...`;
    }

    function cancelEdit() {
        editingIndex = -1;
        resetEditModeUI();
        document.getElementById('status').innerText = "編集をキャンセルしました";
        clearForm(false); 
    }

    function resetEditModeUI() {
        const btnSave = document.getElementById('btn_save_main');
        btnSave.innerText = "記録保存";
        btnSave.style.backgroundColor = "#2d5a27";
        btnSave.style.borderBottomColor = "#1e3d1a";
        document.getElementById('btn_cancel_edit').style.display = "none";
    }

    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('.log-chk');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !allChecked);
    }

    function deleteSelectedLogs() {
        const checkboxes = document.querySelectorAll('.log-chk:checked');
        if (checkboxes.length === 0) {
            alert("削除するログにチェックを入れてください。");
            return;
        }
        if (confirm(`${checkboxes.length}件のログを削除します。よろしいですか？`)) {
            let logs = JSON.parse(localStorage.getItem('radioLogs') || '[]');
            let indices = Array.from(checkboxes).map(cb => parseInt(cb.value)).sort((a, b) => b - a);
            indices.forEach(idx => {
                logs.splice(idx, 1);
            });
            localStorage.setItem('radioLogs', JSON.stringify(logs));
            updateList();
            document.getElementById('status').innerText = `${checkboxes.length}件のログを削除しました`;
        }
    }

    function updateList() {
        const logs = JSON.parse(localStorage.getItem('radioLogs') || '[]');
        document.getElementById('logCount').innerText = `保存済み: ${logs.length}件`;
        const container = document.getElementById('logListContainer');
        container.innerHTML = "";
        [...logs].reverse().forEach((l, i) => {
            const realIndex = logs.length - 1 - i;
            const div = document.createElement('div');
            div.className = "log-card";
            div.innerHTML = `
                <input type="checkbox" class="log-chk" value="${realIndex}">
                <div class="log-card-content">
                    <div class="log-card-header">
                        <span>${l.start_time.split(' ')[1]} ${l.callsign}</span>
                        <span>${l.band.split('/')[1] || l.band}</span>
                    </div>
                    <div class="log-card-body">${l.location || "---"} RS:${l.rs || "---"} <span class="log-card-tag">${l.memo || ""}</span></div>
                    <div class="log-card-actions">
                        <button onclick="editLog(${realIndex})">✏️ 編集</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function exportAndShare() {
        const allLogs = JSON.parse(localStorage.getItem('radioLogs') || '[]');
        if (allLogs.length === 0) {
            alert("保存されているログがありません。");
            return;
        }

        const checkboxes = document.querySelectorAll('.log-chk:checked');
        let exportLogs = [];

        if (checkboxes.length === 0) {
            if (confirm("ログが選択されていません。保存されている【すべて】のログを転送しますか？")) {
                exportLogs = allLogs;
            } else {
                return;
            }
        } else {
            let indices = Array.from(checkboxes).map(cb => parseInt(cb.value)).sort((a, b) => a - b);
            exportLogs = indices.map(idx => allLogs[idx]);
        }

        const blob = new Blob([JSON.stringify(exportLogs, null, 2)], { type: 'application/json' });
        const file = new File([blob], `mobile_log_${Date.now()}.json`, { type: 'application/json' });
        
        if (navigator.share) {
            try { await navigator.share({ files: [file], title: 'Radio Log Export' }); } catch (e) {}
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = file.name; a.click();
        }
    }

    function recordBozu() {
        document.getElementById('callsign').value = "CQ (No Contact)";
        document.getElementById('rs').value = "---";
        saveLog();
    }

    function clearForm(confirmCheck = true) { 
        if(!confirmCheck || confirm("入力内容をリセットしますか？")) location.reload(); 
    }
    
    function clearAllLogs() { 
        if(confirm("【警告】保存されている全ログを抹消します。本当によろしいですか？")) { 
            localStorage.removeItem('radioLogs'); 
            updateList(); 
        } 
    }

    window.onload = updateList;
</script>
</body>
</html>
